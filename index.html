<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>VITAL — Centro de salud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Chivo+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --bg2:#0e0e0d; --panel:#121211; --panel2:#161614;
    --cream:#f0ede6; --coral:#ff5a36; --coral2:#ff7d54; --coraldim:rgba(255,90,54,.14);
    --line:rgba(240,237,230,.12); --line2:rgba(240,237,230,.22);
    --txt:#f0ede6; --mut:rgba(240,237,230,.56); --dim:rgba(240,237,230,.34);
    --good:#5ad17e; --warn:#f5b13d; --bad:#ff6b6b;
    --grot:'Archivo',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --sans:'Instrument Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --mono:'Chivo Mono',ui-monospace,Menlo,Consolas,monospace;
    --r:10px; --r2:8px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;overflow-x:hidden}
  /* faint blueprint grid + soft coral glow */
  body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background-image:linear-gradient(rgba(240,237,230,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(240,237,230,.03) 1px,transparent 1px);
    background-size:46px 46px;mask:radial-gradient(120% 80% at 50% 0%,#000 40%,transparent 100%)}
  body::after{content:"";position:fixed;top:-180px;left:50%;transform:translateX(-50%);
    width:680px;height:420px;z-index:-2;pointer-events:none;border-radius:50%;
    background:radial-gradient(closest-side,rgba(255,90,54,.18),transparent);filter:blur(30px)}
  a{color:var(--coral);text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px 120px}
  .mono{font-family:var(--mono)}
  /* header */
  header{display:flex;align-items:center;gap:13px;padding:18px 4px 10px}
  .logo{width:42px;height:42px;border-radius:9px;display:grid;place-items:center;font-size:22px;font-weight:900;
    background:var(--coral);color:#0a0a0a;box-shadow:4px 4px 0 rgba(255,90,54,.22)}
  header h1{font-family:var(--grot);font-size:24px;margin:0;font-weight:900;letter-spacing:-.04em;line-height:1}
  header .sub{font-family:var(--mono);color:var(--mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.16em;margin-top:3px}
  .hgrow{flex:1}
  .iconbtn{background:transparent;border:1px solid var(--line2);color:var(--txt);width:40px;height:40px;
    border-radius:var(--r2);display:grid;place-items:center;cursor:pointer;font-size:16px;transition:.15s}
  .iconbtn:hover{border-color:var(--coral);color:var(--coral)}
  /* ticker */
  .ticker{border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;
    white-space:nowrap;margin:4px 0 0;padding:7px 0}
  .ticker .track{display:inline-block;animation:scroll 26s linear infinite;font-family:var(--mono);
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut)}
  .ticker b{color:var(--coral);margin:0 6px;font-weight:700}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  /* nav pills */
  .nav{display:flex;gap:7px;overflow-x:auto;padding:14px 2px 8px;margin:0 -2px;scrollbar-width:none;
    -webkit-mask-image:linear-gradient(90deg,#000 88%,transparent);mask-image:linear-gradient(90deg,#000 88%,transparent)}
  .nav::-webkit-scrollbar{display:none}
  .nav button{flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--mut);
    padding:8px 13px;border-radius:999px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:.15s}
  .nav button:hover{border-color:var(--line2);color:var(--txt)}
  .nav button.active{color:#0a0a0a;background:var(--coral);border-color:var(--coral)}
  /* views */
  .view{display:none;animation:rise .28s cubic-bezier(.2,.7,.2,1)}
  .view.active{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:17px;margin-bottom:13px;transition:.15s}
  .card:hover{border-color:var(--line2)}
  .card h2{font-family:var(--grot);margin:0 0 4px;font-size:17px;font-weight:800;letter-spacing:-.02em}
  .card h3{font-family:var(--mono);margin:0 0 13px;font-size:10.5px;color:var(--mut);font-weight:600;
    text-transform:uppercase;letter-spacing:.16em;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .grid{display:grid;gap:13px}
  .cols2{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  .cols3{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .cols4{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden}
  .stat .k{font-family:var(--mono);color:var(--mut);font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:600}
  .stat .v{font-family:var(--grot);font-size:25px;font-weight:800;margin-top:6px;letter-spacing:-.02em}
  .stat .v small{font-family:var(--mono);font-size:11px;color:var(--mut);font-weight:500;letter-spacing:0}
  .stat .trend{font-family:var(--mono);font-size:11px;margin-top:3px}
  .up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--mut)}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .item-title{font-weight:600;font-size:14px}
  .small{font-size:12px}.muted{color:var(--mut)}.dim{color:var(--dim)}
  .date{font-family:var(--mono);color:var(--mut);font-size:11px;white-space:nowrap;letter-spacing:.03em}
  .pill{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600;display:inline-block;
    text-transform:uppercase;letter-spacing:.08em}
  .pill.normal,.pill.good{background:rgba(90,209,126,.13);color:var(--good)}
  .pill.high,.pill.bad{background:rgba(255,107,107,.14);color:var(--bad)}
  .pill.low,.pill.warn{background:rgba(245,177,61,.15);color:var(--warn)}
  .pill.muted{background:rgba(240,237,230,.08);color:var(--mut)}
  .pill.acc{background:var(--coraldim);color:var(--coral)}
  .tag{font-family:var(--mono);display:inline-block;font-size:10.5px;padding:3px 9px;border:1px solid var(--line2);
    border-radius:5px;color:var(--mut);margin:3px 5px 0 0;text-transform:uppercase;letter-spacing:.06em}
  .badge{font-family:var(--mono);font-size:9.5px;padding:3px 7px;border-radius:5px;background:transparent;
    border:1px solid var(--line2);color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
  .empty{color:var(--mut);text-align:center;padding:26px 14px;font-size:13px;line-height:1.75}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--coral);
    font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:9px}
  .kicker .idx{color:var(--dim)}
  /* buttons — brutalist */
  .btn{font-family:var(--mono);background:var(--coral);color:#0a0a0a;border:0;border-radius:var(--r2);
    padding:11px 16px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:.13s}
  .btn:hover{background:var(--coral2)}
  .btn:active{transform:translate(1px,1px)}
  .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line2)}
  .btn.ghost:hover{border-color:var(--coral);color:var(--coral)}
  .btn.sm{padding:8px 12px;font-size:11px}
  .btn.danger{background:var(--bad);color:#0a0a0a}
  canvas{width:100%;display:block}
  details summary{cursor:pointer;list-style:none}
  details summary::-webkit-details-marker{display:none}
  hr.sep{border:0;border-top:1px solid var(--line);margin:12px 0}
  .pri-high{border-left:2px solid var(--bad)}.pri-med{border-left:2px solid var(--warn)}.pri-low{border-left:2px solid var(--coral)}
  .reco{display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}
  .reco:last-child{border-bottom:0}.reco .ic{font-size:24px}
  .progbar{height:6px;border-radius:0;background:rgba(240,237,230,.08);overflow:hidden;margin-top:8px}
  .progbar i{display:block;height:100%;background:var(--coral)}
  /* FAB */
  .fab{position:fixed;right:18px;bottom:24px;width:58px;height:58px;border-radius:14px;border:0;cursor:pointer;
    background:var(--coral);color:#0a0a0a;font-size:30px;font-weight:300;box-shadow:5px 5px 0 rgba(255,90,54,.25);
    z-index:60;display:grid;place-items:center;transition:.18s;font-family:var(--grot)}
  .fab:hover{background:var(--coral2)}
  .fab:active{transform:translate(2px,2px);box-shadow:3px 3px 0 rgba(255,90,54,.25)}
  /* sheet / modal */
  .scrim{position:fixed;inset:0;background:rgba(5,5,5,.7);backdrop-filter:blur(3px);z-index:80;
    opacity:0;pointer-events:none;transition:.2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;background:var(--bg2);border-top:2px solid var(--coral);
    border-radius:16px 16px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);max-width:560px;margin:0 auto}
  .sheet.open{transform:translateY(0)}
  .sheet .grab{width:38px;height:4px;border-radius:9px;background:var(--line2);margin:6px auto 16px}
  .sheet h2{font-family:var(--grot);font-size:21px;margin:0 0 4px;font-weight:800;letter-spacing:-.02em}
  .sheet .desc{color:var(--mut);font-size:13px;margin-bottom:16px;line-height:1.5}
  .field{margin-bottom:13px}
  .field label{font-family:var(--mono);display:block;font-size:10.5px;color:var(--mut);font-weight:600;
    margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line2);
    color:var(--txt);border-radius:var(--r2);padding:12px;font-size:15px;font-family:var(--sans)}
  .field textarea{min-height:70px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--coral);
    box-shadow:0 0 0 3px var(--coraldim)}
  .field.half{display:inline-block;width:calc(50% - 5px)}
  .field.half:nth-child(odd){margin-right:8px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:60px;font-family:var(--mono);background:var(--panel2);border:1px solid var(--line2);
    color:var(--mut);padding:10px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--coraldim);border-color:var(--coral);color:var(--coral)}
  .qa-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .qa{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--r2);padding:14px;cursor:pointer;
    display:flex;flex-direction:column;gap:5px;transition:.14s}
  .qa:hover{border-color:var(--coral)}
  .qa:active{transform:translate(1px,1px)}
  .qa .ic{font-size:22px}.qa .t{font-weight:600;font-size:13px}
  .qa .d{font-family:var(--mono);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
  /* health ring */
  .hero{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .ring-wrap{position:relative;width:150px;height:150px;flex:0 0 auto}
  .ring-wrap .lbl{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring-wrap .lbl .n{font-family:var(--grot);font-size:42px;font-weight:900;line-height:1;letter-spacing:-.04em}
  .ring-wrap .lbl .s{font-family:var(--mono);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.16em;margin-top:4px}
  .hero .meta{flex:1;min-width:210px}
  .hero .meta h2{font-family:var(--grot);font-size:22px;font-weight:800;margin:0 0 4px;letter-spacing:-.02em}
  .checkrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;min-height:46px}
  .checkrow:last-child{border-bottom:0}
  .chk{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--line2);display:grid;place-items:center;
    flex:0 0 auto;font-size:14px;color:transparent;transition:.14s}
  .chk.on{background:var(--coral);border-color:var(--coral);color:#0a0a0a}
  .nudge{display:flex;gap:11px;align-items:center;background:var(--panel2);border:1px solid var(--line2);
    border-radius:var(--r2);padding:13px;margin-bottom:9px;cursor:pointer;transition:.14s}
  .nudge:hover{border-color:var(--coral)}
  .nudge .ic{font-size:20px}
  .nudge .arr{font-family:var(--mono);color:var(--coral)}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--panel2);
    border:1px solid var(--coral);color:var(--txt);padding:11px 18px;border-radius:var(--r2);font-size:12px;font-weight:600;
    font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;z-index:120;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .sectionhead{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:6px 2px 14px}
  .sectionhead h2{font-family:var(--grot);font-size:26px;margin:0;font-weight:900;letter-spacing:-.03em;line-height:1}
  .del{font-family:var(--mono);color:var(--dim);cursor:pointer;font-size:14px;display:inline-flex;
    align-items:center;justify-content:center;width:44px;height:44px;margin:-12px -12px -12px 0;flex:0 0 auto}
  .del:hover{color:var(--bad)}
  /* ---- score breakdown ---- */
  .sb-banner{background:rgba(255,90,54,.07);border:1px solid rgba(255,90,54,.22);border-radius:11px;
    padding:12px 14px;font-size:13px;line-height:1.55;color:var(--txt);margin-bottom:18px}
  .sb-group{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim);margin:18px 2px 8px}
  .sb-row{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid rgba(240,237,230,.06)}
  .sb-ic{flex:0 0 auto;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;margin-top:1px}
  .sb-ic.good{background:rgba(80,200,120,.14);color:#5cc88a}
  .sb-ic.watch{background:rgba(255,196,80,.14);color:#ffc450}
  .sb-ic.miss{background:rgba(240,237,230,.06);color:var(--dim)}
  .sb-main{flex:1;min-width:0}
  .sb-lbl{font-size:13.5px;font-weight:600;line-height:1.35}
  .sb-tip{font-size:11.5px;color:var(--mut);line-height:1.45;margin-top:3px}
  .sb-val{flex:0 0 auto;font-family:var(--mono);font-size:12px;font-weight:700;margin-top:2px}
  .sb-val.good{color:#5cc88a}.sb-val.watch{color:#ffc450}.sb-val.miss{color:var(--dim)}
  .sb-note{margin-top:16px;background:rgba(240,237,230,.04);border-radius:10px;padding:12px 14px;
    font-size:12.5px;line-height:1.55;color:var(--mut)}
  /* ---- labs intelligence ---- */
  .lread-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .lread{border:1px solid rgba(240,237,230,.1);border-radius:13px;padding:13px 15px;background:rgba(240,237,230,.03)}
  .lread.good{border-color:rgba(90,209,126,.3);background:rgba(90,209,126,.06)}
  .lread-h{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
  .lread.good .lread-h b{color:var(--good)}
  .lread-b{font-size:12.5px;line-height:1.5;color:var(--mut)}
  .syscard{border:1px solid rgba(240,237,230,.08);border-radius:13px;margin-bottom:9px;overflow:hidden;background:var(--card,rgba(240,237,230,.02))}
  .syscard summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;font-weight:700}
  .syscard summary::-webkit-details-marker{display:none}
  .sys-name{font-family:var(--grot);font-size:15px;font-weight:800;letter-spacing:-.01em}
  .sys-verdict{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:4px 9px;border-radius:6px}
  .sys-verdict.ok{color:var(--good);background:rgba(90,209,126,.1)}
  .sys-verdict.watch{color:var(--warn);background:rgba(245,177,61,.12)}
  .sysbody{padding:4px 16px 12px}
  .lrow{padding:11px 0;border-top:1px solid rgba(240,237,230,.06)}
  .lrow-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .lrow-name{font-size:13.5px;font-weight:600}
  .lrow-val b{font-family:var(--grot);font-size:17px;font-weight:800}
  .lrow-val b.bad{color:var(--bad)}
  .lrow-val small{font-family:var(--mono);font-size:10px;color:var(--dim)}
  .rbar{position:relative;height:7px;border-radius:4px;background:rgba(240,237,230,.07);margin:8px 0 7px}
  .rbar-band{position:absolute;top:0;bottom:0;background:rgba(90,209,126,.28);border-radius:4px}
  .rbar-dot{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;transform:translate(-50%,-50%);
    border:2px solid var(--bg,#0a0a0a)}
  .rbar-dot.in{background:var(--cream)}
  .rbar-dot.out{background:var(--coral);box-shadow:0 0 0 3px rgba(255,90,54,.25)}
  .lrow-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:baseline}
  .lrow-ref{font-family:var(--mono);font-size:10px;color:var(--dim);flex:0 0 auto}
  .lrow-info{font-size:11.5px;color:var(--mut);line-height:1.4}
  /* ---- insight cards ---- */
  .insight{display:flex;gap:12px;align-items:flex-start;padding:13px;border-radius:12px;cursor:pointer;
    background:rgba(255,90,54,.05);border:1px solid rgba(255,90,54,.14);margin-bottom:9px;transition:.15s}
  .insight:last-child{margin-bottom:0}
  .insight:hover{background:rgba(255,90,54,.09);border-color:rgba(255,90,54,.3)}
  .ins-ic{flex:0 0 auto;font-size:20px;line-height:1.2}
  .ins-main{flex:1;min-width:0}
  .ins-title{font-weight:700;font-size:13.5px;margin-bottom:3px;letter-spacing:-.01em}
  .ins-body{font-size:12px;color:var(--mut);line-height:1.5}
  .ins-x{flex:0 0 auto;color:var(--dim);font-size:13px;width:24px;height:24px;display:flex;
    align-items:center;justify-content:center;border-radius:6px}
  .ins-x:hover{color:var(--bad);background:rgba(255,107,107,.1)}
  /* ---- muscle targets ---- */
  .mt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:4px 0 12px}
  .mt-big{background:rgba(240,237,230,.04);border-radius:12px;padding:14px}
  .mt-n{font-family:var(--grot);font-size:30px;font-weight:900;letter-spacing:-.03em;line-height:1}
  .mt-n small{font-family:var(--mono);font-size:13px;font-weight:400;color:var(--dim);margin-left:2px}
  .mt-l{font-size:12px;margin-top:5px;font-weight:600}
  .mt-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px}
  .mt-macros{display:flex;flex-wrap:wrap;gap:7px}
  .mt-chip{font-size:11.5px;padding:6px 11px;border-radius:8px;background:rgba(240,237,230,.05);border:1px solid rgba(240,237,230,.08)}
  .mt-chip b{font-family:var(--grot);font-weight:800}
  .mt-chip.alt{background:rgba(255,90,54,.1);border-color:rgba(255,90,54,.25)}
  /* ---- watchlist / comparador / supp-map ---- */
  .wl-row{display:flex;justify-content:space-between;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid rgba(240,237,230,.06)}
  .wl-row:first-of-type{border-top:0}
  .wl-mk{flex:0 0 auto}.wl-mk b{font-size:13px}

<script>
/* ============================================================
   VITAL — local-first health center.  Data in localStorage,
   seeded from data/*.json.  The agent (Claude in terminal)
   can also edit data/*.json; use Settings → "Actualizar desde
   archivos" to merge those in.  Export/Import for sync.
   Design language inspired by rig.ai (brutalist / mono / coral).
   ============================================================ */

const LS_KEY = 'vital:v1';
const todayISO = ()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const uid = ()=> 'i'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);

const EMPTY = {
  profile:{ name:'Jorge Tereso', locale:'es-AR',
    units:{weight:'kg',height:'cm',labs:'mg/dL',dateFormat:'DD/MM/YYYY'},
    birthDate:null,sex:null,heightCm:null,weightKg:null,bloodType:null,
    conditions:[],allergies:[],goals:[],emergencyContact:null,insurance:null,
    familyHistory:'',smoking:null,alcohol:'',caffeine:'' },
  vitals:[], labs:[], supplements:[], medications:[], studies:[], appointments:[],
  nutrition:[], sleep:[], journal:[], goals:[], vaccinations:[],
  gym:{summary:{lastSession:null,weeklyCount:0,streak:0},sessions:{}},
  advice:{items:[],recommendations:[]},
  checkins:{}, meta:{createdAt:todayISO(),updatedAt:todayISO()}
};

let S = {};

/* ---------- store ---------- */
function save(){ S.meta.updatedAt=todayISO(); localStorage.setItem(LS_KEY,JSON.stringify(S)); }
function load(){ try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;} }
function clone(o){return o==null?o:JSON.parse(JSON.stringify(o));}
const isObj=o=>o&&typeof o==='object'&&!Array.isArray(o);
// recursive: base = defaults (cloned), add overrides; nested plain objects merged, arrays replaced by add
function deepMerge(base,add){
  if(add===undefined) return clone(base);
  if(!isObj(add)||!isObj(base)) return add;
  const out={...clone(base)};
  for(const k in add){ out[k]= (isObj(base[k])&&isObj(add[k])) ? deepMerge(base[k],add[k]) : add[k]; }
  return out;
}
function backupNow(){ try{const cur=localStorage.getItem(LS_KEY); if(cur) localStorage.setItem(LS_KEY+':bak', cur);}catch(e){} }
// id-keyed upsert: update matching items, append new, KEEP app-only items (no data loss)
function upsert(coll, items, keyfn){
  const idx={}; S[coll].forEach((x,i)=>{const k=keyfn(x); if(k!=null) idx[k]=i;});
  items.forEach(x=>{ const k=keyfn(x); if(k!=null&&idx[k]!=null){ S[coll][idx[k]]={...S[coll][idx[k]],...x}; }
    else { S[coll].push(x); if(k!=null) idx[k]=S[coll].length-1; } });
}
async function seedFromFiles(){
  const map={profile:'profile',labs:'labs',supplements:'supplements',appointments:'appointments',studies:'studies',gym:'gym',advice:'advice'};
  const out={};
  await Promise.all(Object.keys(map).map(async f=>{
    try{const r=await fetch(`data/${f}.json?_=${Date.now()}`);out[f]=await r.json();}catch(e){out[f]=null;}
  }));
  return out;
}
// stable identity per collection (used so re-seeding the same file doesn't duplicate)
const KEYFN={
  labs:x=>x.id||`${x.date}|${x.marker}`,
  supplements:x=>x.id||(x.name||'').toLowerCase().trim(),
  appointments:x=>x.id||`${x.date}|${x.title}`,
  studies:x=>x.id||`${x.date}|${x.title}`,
};
function withId(coll,x){const id=x.id||KEYFN[coll](x);return {...x,id};}
function applySeed(files){
  if(!files) return;
  // profile: file values are DEFAULTS — never clobber a value the user already set
  if(files.profile){ const f=files.profile, cur=S.profile;
    if(f.units) cur.units={...cur.units,...f.units};
    for(const k in f){ if(k==='units') continue;
      const empty = cur[k]==null||cur[k]===''||(Array.isArray(cur[k])&&!cur[k].length);
      const has = f[k]!=null && !(Array.isArray(f[k])&&!f[k].length);
      if(empty&&has) cur[k]=f[k];
    }
  }
  if(files.labs?.results)        upsert('labs',         files.labs.results.map(x=>withId('labs',x)),               KEYFN.labs);
  if(files.supplements?.items)   upsert('supplements',  files.supplements.items.map(x=>withId('supplements',{active:true,...x})), KEYFN.supplements);
  if(files.appointments?.items)  upsert('appointments', files.appointments.items.map(x=>withId('appointments',{status:'upcoming',...x})), KEYFN.appointments);
  if(files.studies?.items)       upsert('studies',      files.studies.items.map(x=>withId('studies',x)),           KEYFN.studies);
  if(files.gym){ S.gym.sessions={...S.gym.sessions,...(files.gym.sessions||{})};
    if(files.gym.summary) S.gym.summary={...S.gym.summary,...files.gym.summary}; }
  // advice is agent-owned (not user-edited) — file is source of truth
  if(files.advice){ if(files.advice.items) S.advice.items=files.advice.items;
    if(files.advice.recommendations) S.advice.recommendations=files.advice.recommendations; }
}

/* ---------- helpers ---------- */
const fmtDate=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;};
const daysUntil=s=>{if(!s)return null;const t=new Date(s+'T00:00:00');const n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/864e5);};
const age=b=>{if(!b)return null;const d=new Date(b+'T00:00:00'),n=new Date();let a=n.getFullYear()-d.getFullYear();if(n.getMonth()<d.getMonth()||(n.getMonth()===d.getMonth()&&n.getDate()<d.getDate()))a--;return a;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const flagClass=f=>f==='high'?'high':f==='low'?'low':f==='normal'?'normal':'muted';
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function bmi(){const p=S.profile;if(!p.heightCm||!p.weightKg)return null;const m=p.heightCm/100;return +(p.weightKg/(m*m)).toFixed(1);}
function latestVital(type){const a=S.vitals.filter(v=>v.type===type).sort((x,y)=>(x.date||'').localeCompare(y.date||''));return a.length?a[a.length-1]:null;}

/* ---------- health score ---------- */
function healthScore(){
  const p=S.profile;
  const recent=(arr,days,key='date')=>arr.filter(x=>{const d=daysUntil(x[key]);return d!=null&&d>=-days;}).length;
  const F=[]; // factores: {group:'salud'|'datos', label, got, max, kind, tip}
  const push=(group,label,got,max,kind,tip)=>F.push({group,label,got,max,kind,tip:tip||''});

  // ---------- SALUD (señales reales de tu cuerpo) ----------
  if(S.labs.length){
    const flagged=S.labs.filter(l=>l.flag==='high'||l.flag==='low');
    const inRange=S.labs.length-flagged.length;
    push('salud',`Bioquímica: ${inRange}/${S.labs.length} valores en rango`, Math.round(inRange/S.labs.length*18), 18,'good',
      'La gran mayoría de tu análisis está dentro de los valores de referencia. Es buena salud de base, no un problema.');
    if(flagged.length) push('salud',`${flagged.length} valores a recontrolar`, -Math.min(12,flagged.length*3), 0,'watch',
      'De 2025: '+flagged.map(f=>f.marker).join(', ')+'. Los venís corrigiendo con los suplementos; tu nuevo análisis (30/07) dirá si se acomodaron. No es una alarma.');
  } else {
    push('datos','Sin análisis cargado', 0, 8,'missing','Cargá tu último análisis para que el centro evalúe tu bioquímica.');
  }
  const trains=(S.gym.summary?.weeklyCount||0)>=2;
  push('salud','Entrenás 2+ veces por semana', trains?10:0, 10, trains?'good':'missing',
    trains?'':'Ya entrenás 3-5 veces — falta sincronizar GymBro para que el centro lo cuente. No es que no entrenes.');
  const sleepOk=recent(S.sleep,7)>=3;
  push('salud','Sueño medido y suficiente', sleepOk?8:0, 8, sleepOk?'good':'missing',
    sleepOk?'':'Cuando conectes un reloj/anillo, tu sueño entra solo y suma acá.');

  // ---------- DATOS (lo que al centro le falta tener — NO es tu salud) ----------
  const pcFields=['birthDate','sex','heightCm','weightKg','bloodType']; const pc=pcFields.filter(k=>p[k]).length;
  push('datos',`Perfil ${pc}/${pcFields.length} completo`, pc*2, pcFields.length*2,'profile',
    pc<pcFields.length?'Sumá altura, peso y grupo sanguíneo (te los pedí para el plan muscular).':'');
  const wear=recent(S.vitals,30)>0;
  push('datos','Reloj / Apple Health conectado', wear?8:0, 8, wear?'good':'missing',
    wear?'':'Todavía sin reloj: FC, HRV, SpO₂, peso y pasos no entran automáticamente.');
  push('datos','Controles agendados', S.appointments.some(a=>a.status==='upcoming')?3:0,3,'good','');

  let score=Math.max(5,Math.min(99,Math.round(50+F.reduce((s,f)=>s+f.got,0))));
  const grade=score>=80?'Excelente':score>=65?'Muy bien':score>=50?'Sólido':score>=35?'En construcción':'Arrancando';
  const datosGap=F.filter(f=>f.group==='datos').reduce((s,f)=>s+(f.max-f.got),0);
  const saludGap=F.filter(f=>f.kind==='watch').reduce((s,f)=>s-f.got,0);
  return {score, grade, factors:F, datosGap, saludGap};
}
function openScoreBreakdown(){
  const {score,grade,factors,datosGap,saludGap}=healthScore();
  const row=f=>{
    const ic=f.kind==='good'?'✓':f.kind==='watch'?'◷':f.kind==='profile'?'👤':f.kind==='missing'?'＋':'•';
    const cls=f.kind==='good'?'good':f.kind==='watch'?'watch':'miss';
    const val=f.got>0?`+${f.got}`:f.got<0?`${f.got}`:(f.max?`+0 / +${f.max}`:'—');
    return `<div class="sb-row">
      <div class="sb-ic ${cls}">${ic}</div>
      <div class="sb-main"><div class="sb-lbl">${f.label}</div>${f.tip?`<div class="sb-tip">${f.tip}</div>`:''}</div>
      <div class="sb-val ${cls}">${val}</div></div>`;
  };
  const salud=factors.filter(f=>f.group==='salud'), datos=factors.filter(f=>f.group==='datos');
  const dom = datosGap>=saludGap
    ? `Lo que más te frena <b>no es tu salud</b>: son <b>datos que el centro todavía no tiene</b> (reloj sin conectar, entrenos sin sincronizar, perfil incompleto). Suma rápido en cuanto los conectes.`
    : `El principal punto a seguir son <b>${saludGap} pts</b> de valores de laboratorio de 2025 que vas a recontrolar el 30/07.`;
  openSheet(`<h2>Tu Vital Score: ${score} <span class="dim" style="font-weight:400">· ${grade}</span></h2>
    <div class="desc">No es una nota de "qué tan enfermo estás". Es <b>cuánta foto de tu salud tiene el centro</b>. Arranca en 50 y sube o baja según esto:</div>
    <div class="sb-banner">${dom}</div>
    <div class="sb-group">SALUD · señales reales de tu cuerpo</div>
    ${salud.map(row).join('')}
    <div class="sb-group">DATOS · lo que falta conectar (no es tu salud)</div>
    ${datos.map(row).join('')}
    <div class="sb-note">📈 Subís el score sin esfuerzo diario: completá el perfil, conectá un reloj, sincronizá GymBro, y dejá que lleguen tus labs del 30/07. Nada de carga manual día a día.</div>
    <button class="btn" style="margin-top:14px;width:100%" onclick="closeSheet()">Entendido</button>`);
}
/* ---------- motor de insights: cruza labs + suplementos + turnos + objetivos ---------- */
function buildInsights(){
  const out=[];
  const flag=n=>{const r=labFind(n);return r&&(r.flag==='high'||r.flag==='low')?r:null;};
  const supp=txt=>S.supplements.some(s=>(((s.name||'')+' '+(s.purpose||'')+' '+(s.notes||'')).toLowerCase().includes(txt)));
  const add=(id,ic,title,body,link)=>out.push({id,ic,title,body,link});
  const cort=flag('Cortisol'), mn=flag('Manganeso'), eo=flag('Eosin'), mono=flag('Monocitos');
  if(cort) add('cortisol-sueno','🌙','Tu cortisol y tu sueño están conectados',
    `Tu cortisol salió algo alto (${cort.value}) y vos mismo decís que dormís poco (~7 h). Dormir poco sube el cortisol; tu magnesio de noche ya juega a favor. Mejorar el descanso puede ayudar a bajarlo — lo chequeamos en el análisis nuevo. (Una sola muestra depende de la hora de extracción.)`,'sleep');
  if(mn&&supp('manganeso')) add('manganeso','🧪','Manganeso: a confirmar en el nuevo análisis',
    `Estaba indetectable (<0.10) y lo venís suplementando (5 mg/día). Tu análisis del 30/06 debería mostrar si subió — es la hipótesis más clara para verificar que la fórmula funciona.`,'labs');
  if(eo) add('eosino','🤧','Eosinófilos altos: posible alergia',
    `Tus eosinófilos (${eo.value}%) suelen subir por un componente alérgico/atópico. La quercetina de tu fórmula es antihistamínica y puede ayudar. Si tenés rinitis o alergias, vale comentarlo en el control.`,'labs');
  if(cort||mono) add('gap-medico','🩺','Anotá para tu próximo control',
    `${[cort&&'tu cortisol alto',mono&&'tus monocitos bajos'].filter(Boolean).join(' y ')} no ${(cort&&mono)?'tienen':'tiene'} ningún suplemento apuntándole directamente. No es para automedicarse: anotalo para preguntarle a la Dra. Cristaldo.`,'appts');
  if((S.profile.goals||[]).some(g=>/m[úu]scul/i.test(g))&&!S.profile.weightKg)
    add('peso-proteina','🏋️','Cargá tu peso para el plan muscular',
    `Para darte el objetivo exacto de proteína y calorías (tu meta #1) necesito tu peso y altura. Tocá para completarlo y se activa la calculadora en Nutrición.`,'__profile');
  const bt=S.appointments.find(a=>a.status==='upcoming'&&/sangre|an[áa]lisis|test|control/i.test(((a.title||'')+' '+(a.type||''))));
  if(bt){const d=daysUntil(bt.date);if(d!=null&&d>=0&&d<=45) add('comparador','📊','Tu próximo análisis va a ser comparable',
    `En ${d} día(s) te hacés el control. Cuando lleguen los resultados los comparo marcador por marcador contra tu base de 2025 para ver exactamente qué se acomodó.`,'labs');}
  // recordatorio predictivo: labs por cumplir un año sin control agendado
  const labDate=S.labs.map(l=>l.date).filter(Boolean).sort().pop();
  if(labDate&&!bt){const mo=Math.round((new Date(todayISO())-new Date(labDate))/2629800000);
    if(mo>=11) add('labs-due','📅','Tus análisis están por cumplir un año',`Hace ${mo} meses del último control. Conviene repetir el análisis anual — decime y te agendo el turno con su evento privado.`,'appts');}
  return out.filter(i=>!((S.meta&&S.meta.dismissed)||[]).includes(i.id));
}
function dismissInsight(id){ if(!S.meta.dismissed)S.meta.dismissed=[]; S.meta.dismissed.push(id); save(); renderToday(); toast('Listo, no lo muestro más'); }
function openAutoGuide(){
  openSheet(`<h2>Automatizar tu salud</h2>
  <div class="desc">Para que sueño, FC, HRV, peso y pasos entren <b>solos</b>, sin que cargues nada a mano.</div>
  <div class="ag-step"><b>1 · Conseguí un reloj o anillo</b><br>Apple Watch Ultra 2 u Oura Ring 4 — todo va a Apple Health en tu iPhone 16 Pro. (Están en Consejos → dispositivos.)</div>
  <div class="ag-step"><b>2 · Instalá "Health Auto Export" (iOS)</b><br>App que exporta tu Apple Health a JSON automáticamente.</div>
  <div class="ag-step"><b>3 · Atajo de iOS a las 8:00</b><br>Una Automatización diaria que exporta tu noche y deja el JSON en el portapapeles; después tocás <b>⌚ Apple Health</b> acá y pegás. Dos toques.</div>
  <div class="ag-step"><b>4 · 100% automático (próximo paso)</b><br>Con Cloudflare, el iPhone escribe directo y la app lee sola — sin pegar nada. Te lo dejo listo cuando quieras acceso desde el celu.</div>
  <button class="btn" style="margin-top:14px;width:100%" onclick="openHealthImport()">⌚ Importar ahora</button>`);
}

/* ============================================================
   SECTIONS
   ============================================================ */
const SECTIONS=[
  {id:'today',  t:'Hoy',        kick:'Panel',          render:renderToday},
  {id:'body',   t:'Cuerpo',     kick:'Signos vitales', render:renderBody},
  {id:'labs',   t:'Labs',       kick:'Bioquímica',     render:renderLabs},
  {id:'meds',   t:'Suplem.',    kick:'Protocolo',      render:renderMeds},
  {id:'nutri',  t:'Nutrición',  kick:'Ingesta',        render:renderNutri},
  {id:'sleep',  t:'Sueño',      kick:'Descanso',       render:renderSleep},
  {id:'gym',    t:'Gym',        kick:'Entrenamiento',  render:renderGym},
  {id:'mind',   t:'Diario',     kick:'Bienestar',      render:renderMind},
  {id:'studies',t:'Estudios',   kick:'Archivo',        render:renderStudies},
  {id:'appts',  t:'Turnos',     kick:'Agenda',         render:renderAppts},
  {id:'goals',  t:'Objetivos',  kick:'Metas',          render:renderGoals},
  {id:'vacc',   t:'Vacunas',    kick:'Inmunización',   render:renderVacc},
  {id:'insights',t:'Consejos',  kick:'Análisis',       render:renderInsights},
  {id:'settings',t:'Ajustes',   kick:'Sistema',        render:renderSettings},
];
let CUR='today';
function curIdx(){return SECTIONS.findIndex(s=>s.id===CUR);}
function kicker(){const i=curIdx();const s=SECTIONS[i]||{};return `<div class="kicker"><span class="idx">${String(i+1).padStart(2,'0')} /</span> ${esc(s.kick||'')}</div>`;}
function buildNav(){
  document.getElementById('nav').innerHTML=SECTIONS.filter(s=>s.id!=='settings').map(s=>
    `<button data-s="${s.id}" class="${s.id===CUR?'active':''}">${s.t}</button>`).join('');
  document.getElementById('views').innerHTML=SECTIONS.map(s=>`<section class="view ${s.id===CUR?'active':''}" id="v-${s.id}"></section>`).join('');
}
function show(id){
  CUR=id;
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='v-'+id));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.s===id));
  const sec=SECTIONS.find(s=>s.id===id); if(sec) sec.render();
  const ab=document.querySelector('#nav button.active'); if(ab) ab.scrollIntoView({inline:'center',block:'nearest'});
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderCurrent(){ const s=SECTIONS.find(s=>s.id===CUR); if(s) s.render(); }

/* ---------- TODAY ---------- */
function renderToday(){
  const el=document.getElementById('v-today');
  const hs=healthScore(); const score=hs.score;
  const insights=buildInsights();
  const wb=weeklyBriefing();
  const p=S.profile; const a=age(p.birthDate);
  const sinceLast=(arr,key='date')=>{const ds=arr.map(x=>daysUntil(x[key])).filter(d=>d!=null);return ds.length?-Math.max(...ds):null;};

function profileCompleteness(){
  const p=S.profile;
  const fields=[['birthDate','Nacimiento'],['sex','Sexo'],['heightCm','Altura'],['weightKg','Peso'],
    ['bloodType','Grupo sang.'],['allergies','Alergias'],['conditions','Condiciones'],['emergencyContact','Contacto emerg.']];
  const has=k=>{const v=p[k];return Array.isArray(v)?v.length>0:(v!=null&&v!=='');};
  const done=fields.filter(f=>has(f[0]));
  return {pct:Math.round(done.length/fields.length*100), missing:fields.filter(f=>!has(f[0])).map(f=>f[1])};
}

function rangeBar(r){
  const lo=r.refLow,hi=r.refHigh,v=+r.value;
  if(lo==null&&hi==null||isNaN(v))return '';
  let dLo,dHi;
  if(lo!=null&&hi!=null){const pad=(hi-lo)*0.28;dLo=Math.min(lo-pad,v);dHi=Math.max(hi+pad,v);}
  else if(hi!=null){dLo=0;dHi=Math.max(hi*1.3,v*1.1);}
  else{dLo=Math.min(lo*0.7,v*0.9);dHi=Math.max(lo*1.7,v*1.1);}
  const span=(dHi-dLo)||1,pct=x=>Math.max(1,Math.min(99,((x-dLo)/span)*100));
  const bL=lo!=null?pct(lo):0,bR=hi!=null?pct(hi):100,vp=pct(v);
  const out=r.flag==='high'||r.flag==='low';
  return `<div class="rbar"><div class="rbar-band" style="left:${bL}%;right:${100-bR}%"></div>
    <div class="rbar-dot ${out?'out':'in'}" style="left:${vp}%"></div></div>`;
}

function comparatorRows(){
  const byM={}; S.labs.forEach(r=>{(byM[r.marker]||=[]).push(r);});
  const rows=[];
  Object.entries(byM).forEach(([m,arr])=>{
    if(arr.length<2)return; arr.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const a=arr[arr.length-2],b=arr[arr.length-1],dv=+b.value-+a.value;
    if(Math.abs(dv)<1e-9){rows.push({m,a,b,good:null});return;}
    const gd=GOOD_DIR[m]; const good=gd?(gd==='down'?dv<0:dv>0):null;
    rows.push({m,a,b,dv,good});
  });
  return rows;
}
function spark(id,vals,last,H){
  const cv=document.getElementById(id);if(!cv)return;H=H||120;
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth;cv.width=W*dpr;cv.height=H*dpr;
  const x=cv.getContext('2d');x.scale(dpr,dpr);
  const min=Math.min(...vals),max=Math.max(...vals),pad=H>60?16:6,span=(max-min)||1;
  const px=i=>pad+i*(W-2*pad)/(vals.length-1),py=v=>H-pad-((v-min)/span)*(H-2*pad);
  if(last&&(last.refLow!=null||last.refHigh!=null)){
    const yH=last.refHigh!=null?py(Math.min(max,Math.max(min,last.refHigh))):pad;
    const yL=last.refLow!=null?py(Math.min(max,Math.max(min,last.refLow))):H-pad;
    x.fillStyle='rgba(90,209,126,.08)';x.fillRect(pad,yH,W-2*pad,Math.max(2,yL-yH));
  }
  x.strokeStyle='#ff5a36';x.lineWidth=2.4;x.beginPath();vals.forEach((v,i)=>i?x.lineTo(px(i),py(v)):x.moveTo(px(i),py(v)));x.stroke();
  if(H>60)vals.forEach((v,i)=>{x.fillStyle='#ff5a36';x.beginPath();x.arc(px(i),py(v),3,0,7);x.fill();});
}

function sleepStats(){
  const it=S.sleep.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const recent=it.slice(-14).map(x=>+x.hours).filter(h=>!isNaN(h));
  if(!recent.length) return null;
  const tgt=8, avg=recent.reduce((s,h)=>s+h,0)/recent.length;
  const debt=recent.reduce((s,h)=>s+Math.max(0,tgt-h),0);
  const sd=Math.sqrt(recent.reduce((s,h)=>s+(h-avg)**2,0)/recent.length);
  const consistency=Math.max(0,Math.min(100,Math.round(100-sd*22)));
  return {avg:+avg.toFixed(1),debt:+debt.toFixed(1),consistency,n:recent.length,tgt,sd:+sd.toFixed(1)};
}
function idealBedtime(wake){ // wake 'HH:MM' → bedtimes para 5-6 ciclos
  const [h,m]=(wake||'07:00').split(':').map(Number); const wm=h*60+m;
  return [6,5].map(c=>{let t=((wm-(c*90+15))%1440+1440)%1440;return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0')+` (${c} ciclos)`;});
}

const MUSCLE_MAP=[
  [/peso muerto|deadlift|femoral|hip ?thrust|gl[uú]teo|curl femoral|rumano|rdl/i,'Posterior/Glúteo'],
  [/sentadilla|squat|prensa|leg ?press|estoc|zancada|b[uú]lgar|hack|cu[aá]drice|extensi[oó]n.*cuad/i,'Cuádriceps'],
  [/gemelo|pantorrilla|calf|sóleo|soleo/i,'Gemelos'],
  [/press banca|banca|pecho|chest|apertura|fly|pec|peck/i,'Pecho'],
  [/dominada|pull ?up|jal[oó]n|remo|row|espalda|pull|dorsal/i,'Espalda'],
  [/press militar|hombro|shoulder|laterales|deltoide|overhead|arnold/i,'Hombros'],
  [/b[ií]ceps|curl(?!.*femoral)|predicador/i,'Bíceps'],
  [/tr[ií]ceps|fondos|polea.*tri|push.?down|copa|frances/i,'Tríceps'],
  [/abdom|core|plancha|crunch|rueda|ab ?wheel|elevaci[oó]n.*pierna/i,'Core'],
];
function muscleOf(n){n=n||'';for(const[re,m]of MUSCLE_MAP)if(re.test(n))return m;return 'Otros';}
function gymAnalytics(){
  const sessions=(S.gym&&S.gym.sessions)||{};
  const dates=Object.keys(sessions).sort();
  if(!dates.length) return null;
  const ref=dates[dates.length-1];
  const within7=d=>{const diff=(new Date(ref+'T00:00')-new Date(d+'T00:00'))/86400000;return diff>=0&&diff<7;};
  // volumen semanal por músculo (series efectivas done)
  const vol={};
  dates.filter(within7).forEach(d=>{const s=sessions[d];Object.values(s.exercises||{}).forEach(e=>{
    const done=(e.sets||[]).filter(x=>x.done).length; if(done) vol[muscleOf(e.name)]=(vol[muscleOf(e.name)]||0)+done;});});
  const volume=Object.entries(vol).map(([muscle,sets])=>({muscle,sets})).sort((a,b)=>b.sets-a.sets);
  // progresión por ejercicio (e1RM Epley del top set)
  const byEx={};
  dates.forEach(d=>{const s=sessions[d];Object.values(s.exercises||{}).forEach(e=>{
    const sets=(e.sets||[]).filter(x=>x.done&&+x.w>0&&+x.r>0);
    if(!sets.length)return; const top=Math.max(...sets.map(x=>+x.w*(1+(+x.r)/30)));
    (byEx[e.name||'Ej']||=[]).push({date:d,e1rm:Math.round(top)});});});
  const progression=Object.entries(byEx).filter(([,p])=>p.length>=2).map(([name,p])=>{
    p.sort((a,b)=>a.date.localeCompare(b.date));
    const first=p[0].e1rm,last=p[p.length-1].e1rm,delta=last-first;
    const tail=p.slice(-3).map(x=>x.e1rm); const stalled=tail.length>=3&&Math.max(...tail)<=tail[0];
    return {name,points:p,first,last,delta,stalled};
  }).sort((a,b)=>b.points.length-a.points.length).slice(0,8);
  return {volume,progression,weekSessions:dates.filter(within7).length};
}

function drawRadar(id,axes){
  const cv=document.getElementById(id);if(!cv)return;
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=240;cv.width=W*dpr;cv.height=H*dpr;
  const x=cv.getContext('2d');x.scale(dpr,dpr);
  const cx=W/2,cy=H/2,R=Math.min(W,H)/2-34,N=axes.length;
  const pt=(i,r)=>[cx+Math.cos(-Math.PI/2+i*2*Math.PI/N)*r,cy+Math.sin(-Math.PI/2+i*2*Math.PI/N)*r];
  // grid
  x.strokeStyle='rgba(240,237,230,.1)';x.fillStyle='rgba(240,237,230,.34)';x.font='9px monospace';
  [0.33,0.66,1].forEach(g=>{x.beginPath();axes.forEach((a,i)=>{const[px,py]=pt(i,R*g);i?x.lineTo(px,py):x.moveTo(px,py);});x.closePath();x.stroke();});
  axes.forEach((a,i)=>{const[px,py]=pt(i,R);x.strokeStyle='rgba(240,237,230,.1)';x.beginPath();x.moveTo(cx,cy);x.lineTo(px,py);x.stroke();
    const[lx,ly]=pt(i,R+16);x.textAlign=lx<cx-5?'right':lx>cx+5?'left':'center';x.fillStyle='rgba(240,237,230,.56)';x.fillText(a.label,lx,ly+3);});
  // value polygon
  x.beginPath();axes.forEach((a,i)=>{const[px,py]=pt(i,R*Math.max(0.06,a.val));i?x.lineTo(px,py):x.moveTo(px,py);});x.closePath();
  x.fillStyle='rgba(255,90,54,.18)';x.fill();x.strokeStyle='#ff5a36';x.lineWidth=2;x.stroke();
  axes.forEach((a,i)=>{const[px,py]=pt(i,R*Math.max(0.06,a.val));x.fillStyle=a.val<0.999?'#f5b13d':'#5ad17e';x.beginPath();x.arc(px,py,3,0,7);x.fill();});
}

function muscleTargets(){
  const p=S.profile; if(!p.weightKg) return null;
  const kg=+p.weightKg, cm=+p.heightCm||175, yr=age(p.birthDate)||42, male=p.sex!=='Femenino';
  const bmr=Math.round(10*kg+6.25*cm-5*yr+(male?5:-161));
  const tdee=Math.round(bmr*1.55);          // 3-5 entrenos/sem ≈ moderado
  const surplus=tdee+300;                    // superávit magro para hipertrofia
  const prot=Math.round(kg*2.0), protLo=Math.round(kg*1.6), protHi=Math.round(kg*2.2);
  const fat=Math.round(kg*0.9);
  const carbs=Math.max(0,Math.round((surplus-(prot*4+fat*9))/4));
  return {kg,bmr,tdee,surplus,prot,protLo,protHi,fat,carbs};
}

  const items=S.appointments.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!items.length){el.innerHTML=html+emptyCard('No hay turnos.<br>Tocá <b>+ Agregar</b> o pasame la fecha por el chat; lo agendo y creo el evento <b>privado</b> en tu Google Calendar.');return;}

  const fld=f.fields.map(x=>{
    const def=typeof x.def==='function'?x.def():(x.def||'');
    if(x.type==='select')return `<div class="field ${x.half?'half':''}"><label>${x.l}${x.req?' *':''}</label>
      <select data-k="${x.k}">${(x.opts||[]).map(o=>`<option value="${o.v}">${o.t}</option>`).join('')}</select></div>`;
    if(x.type==='textarea')return `<div class="field"><label>${x.l}${x.req?' *':''}</label><textarea data-k="${x.k}" placeholder="${x.ph||''}">${def}</textarea></div>`;
    if(x.type==='bool')return `<div class="field"><label>${x.l}</label><div class="seg"><button type="button" data-seg="${x.k}" data-v="" class="on">No</button><button type="button" data-seg="${x.k}" data-v="1">Sí</button></div></div>`;
    if(x.type==='seg'){const di=Math.floor((x.opts.length-1)/2);_formState[x.k]=x.opts[di].v; // preselect middle so nothing saves null
      return `<div class="field"><label>${x.l}</label><div class="seg">${x.opts.map((o,i)=>`<button type="button" data-seg="${x.k}" data-v="${o.v}" class="${i===di?'on':''}">${o.t}</button>`).join('')}</div></div>`;}
    const it=x.type==='number'?'number':x.type==='date'?'date':x.type==='time'?'time':'text';
    const im=x.type==='number'?' inputmode="decimal"':'';
    return `<div class="field ${x.half?'half':''}"><label>${x.l}${x.req?' *':''}</label>
      <input type="${it}" data-k="${x.k}" value="${def}" placeholder="${x.ph||''}"${im} ${it==='number'?'step="any"':''}></div>`;
  }).join('');
  const back=fromQuick?`<button type="button" class="btn ghost" onclick="openQuickAdd()">‹ Atrás</button>`
    :`<button type="button" class="btn ghost" onclick="closeSheet()">Cancelar</button>`;
  openSheet(`<h2>${f.title}</h2><div class="desc">${f.desc}</div>
    <form id="theForm" onsubmit="return submitForm('${type}')">${fld}
    <div style="display:flex;gap:8px;margin-top:8px"><button type="submit" class="btn" style="flex:1">Guardar</button>
    ${back}</div></form>`);
  sheet.querySelectorAll('[data-seg]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.seg;sheet.querySelectorAll(`[data-seg="${k}"]`).forEach(x=>x.classList.remove('on'));
    b.classList.add('on');_formState[k]=b.dataset.v;}));
}
function submitForm(type){
  const f=FORMS[type];const d={};
  sheet.querySelectorAll('[data-k]').forEach(i=>d[i.dataset.k]=i.value);
  Object.assign(d,_formState);
  for(const x of f.fields)if(x.req&&!d[x.k]){toast('Falta: '+x.l);return false;}
  if(f.custom){f.custom(d);}
  else{const obj=f.map(d);S[f.coll].push(obj);}
  save();closeSheet();renderCurrent();renderToday();toast('✓ Guardado');
  return false;
}

    <div class="field"><label>Nombre</label><input data-p="name" value="${esc(p.name||'')}"></div>
    <div class="field half"><label>Fecha de nacimiento</label><input type="date" data-p="birthDate" value="${p.birthDate||''}"></div>
    <div class="field half"><label>Sexo</label><select data-p="sex"><option value="">—</option>
      <option ${p.sex==='Masculino'?'selected':''}>Masculino</option><option ${p.sex==='Femenino'?'selected':''}>Femenino</option><option ${p.sex==='Otro'?'selected':''}>Otro</option></select></div>
    <div class="field half"><label>Altura (cm)</label><input type="number" data-p="heightCm" value="${p.heightCm||''}"></div>
    <div class="field half"><label>Peso (kg)</label><input type="number" step="any" data-p="weightKg" value="${p.weightKg||''}"></div>
    <div class="field half"><label>Grupo sanguíneo</label><input data-p="bloodType" value="${esc(p.bloodType||'')}" placeholder="0+"></div>
    <div class="field half"><label>Contacto emergencia</label><input data-p="emergencyContact" value="${esc(p.emergencyContact||'')}"></div>
    <div class="field"><label>Alergias (coma)</label><input data-p="allergies" value="${esc((p.allergies||[]).join(', '))}"></div>
    <div class="field"><label>Condiciones (coma)</label><input data-p="conditions" value="${esc((p.conditions||[]).join(', '))}"></div>
    <div class="field"><label>Antecedentes familiares</label><textarea data-p="familyHistory" placeholder="Ej: padre hipertensión, abuela diabetes">${esc(p.familyHistory||'')}</textarea></div>
    <div class="field half"><label>Tabaco</label><select data-p="smoking"><option value="">—</option>
      <option ${p.smoking==='Nunca'?'selected':''}>Nunca</option><option ${p.smoking==='Ex fumador'?'selected':''}>Ex fumador</option><option ${p.smoking==='Fumador'?'selected':''}>Fumador</option></select></div>
    <div class="field half"><label>Cafeína / día</label><input data-p="caffeine" value="${esc(p.caffeine||'')}" placeholder="2 cafés"></div>
    <div class="field"><label>Alcohol</label><input data-p="alcohol" value="${esc(p.alcohol||'')}" placeholder="Ej: 2-3 copas/semana"></div>
    <div class="field"><label>Obra social / seguro</label><input data-p="insurance" value="${esc(p.insurance||'')}"></div>
    <div style="display:flex;gap:8px;margin-top:8px"><button class="btn" style="flex:1">Guardar</button>
    <button type="button" class="btn ghost" onclick="closeSheet()">Cancelar</button></div></form>`);
}
function saveProfile(){
  const g=k=>sheet.querySelector(`[data-p="${k}"]`).value;
  Object.assign(S.profile,{name:g('name'),birthDate:g('birthDate')||null,sex:g('sex')||null,
    heightCm:g('heightCm')?+g('heightCm'):null,weightKg:g('weightKg')?+g('weightKg'):null,
    bloodType:g('bloodType')||null,emergencyContact:g('emergencyContact')||null,insurance:g('insurance')||null,
    familyHistory:g('familyHistory')||'',smoking:g('smoking')||null,alcohol:g('alcohol')||'',caffeine:g('caffeine')||'',
    allergies:g('allergies').split(',').map(s=>s.trim()).filter(Boolean),
    conditions:g('conditions').split(',').map(s=>s.trim()).filter(Boolean)});
  if(S.profile.weightKg){const t=todayISO();if(!S.vitals.some(v=>v.type==='weight'&&v.date===t))S.vitals.push({id:uid(),type:'weight',value:S.profile.weightKg,unit:'kg',date:t});}
  save();closeSheet();renderCurrent();toast('✓ Perfil actualizado');return false;
}

/* ---------- data ops ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`vital-${todayISO()}.json`;a.click();toast('Exportado');
}
async function copyData(){try{await navigator.clipboard.writeText(JSON.stringify(S));toast('Copiado al portapapeles');}catch(e){exportData();}}
function openImport(){
  openSheet(`<h2>Importar datos</h2><div class="desc">Pegá un JSON de Vital (reemplaza todo).</div>
    <div class="field"><textarea id="impTxt" style="min-height:160px" placeholder='{"profile":...}'></textarea></div>
    <button class="btn" onclick="doImport()">Importar</button> <button class="btn ghost" onclick="closeSheet()">Cancelar</button>`);
}
function doImport(){try{const d=JSON.parse(document.getElementById('impTxt').value);backupNow();S=deepMerge(EMPTY,d);save();closeSheet();show('today');toast('Importado (copia guardada)');}catch(e){toast('JSON inválido');}}
function restoreBackup(){const b=localStorage.getItem(LS_KEY+':bak');if(!b){toast('No hay copia');return;}if(confirm('¿Restaurar la última copia? Se reemplazan los datos actuales.')){localStorage.setItem(LS_KEY,b);location.reload();}}
function openGymImport(){
  openSheet(`<h2>Importar GymBro</h2><div class="desc">En GymBro, exportá tu data y pegá el JSON (clave gymbro:v2) acá.</div>
    <div class="field"><textarea id="gymTxt" style="min-height:160px" placeholder='{"log":{...}}'></textarea></div>
    <button class="btn" onclick="doGymImport()">Importar</button> <button class="btn ghost" onclick="closeSheet()">Cancelar</button>`);
}
function doGymImport(){
  try{const g=JSON.parse(document.getElementById('gymTxt').value);const log=g.log||g.sessions||g;
    S.gym=S.gym||{summary:{},sessions:{}}; S.gym.summary=S.gym.summary||{};
    S.gym.sessions={...S.gym.sessions,...log};                 // merge, never drop prior dates
    const dates=Object.keys(S.gym.sessions).sort();
    S.gym.summary.lastSession=dates[dates.length-1]||null;
    S.gym.summary.weeklyCount=dates.filter(d=>daysUntil(d)>=-7).length;
    // streak: consecutive days back from today that have a session
    let streak=0; const set=new Set(dates);
    for(let i=0;;i++){const d=new Date();d.setDate(d.getDate()-i);
      const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(set.has(iso))streak++; else if(i>0) break;}
    S.gym.summary.streak=streak;
    save();closeSheet();show('gym');toast('GymBro importado');}catch(e){toast('JSON inválido');}
}
async function reSeed(){const files=await seedFromFiles();applySeed(files);save();renderCurrent();toast('Actualizado (sin perder tus datos)');}

/* ---------- Apple Health import (automatic data path) ---------- */
function openHealthImport(){
  openSheet(`<h2>Conectar Apple Health</h2><div class="desc">Lo de todos los días (sueño, FC, HRV, SpO₂, peso, pasos, presión) entra solo desde tu reloj. En el iPhone instalá <b>Health Auto Export</b>, configurá un export en <b>JSON</b> de tus métricas y pegá el contenido acá (lo mapeo y deduplico por fecha). Más adelante lo dejamos 100% automático con un backend.</div>
    <div class="field"><textarea id="haeTxt" style="min-height:170px" placeholder='{"data":{"metrics":[{"name":"weight_body_mass","data":[{"date":"2026-06-20 08:00:00 -0300","qty":82.1}]}]}}'></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="doHealthImport()">Importar</button>
    <button class="btn ghost" onclick="closeSheet()">Cancelar</button></div>`);
}
function doHealthImport(){
  try{
    const j=JSON.parse(document.getElementById('haeTxt').value);
    const metrics=(j.data&&j.data.metrics)||j.metrics||[];
    if(!Array.isArray(metrics)||!metrics.length){toast('No encontré métricas');return;}
    const dkey=s=>(''+(s||'')).slice(0,10);
    const NAMEMAP={weight_body_mass:'weight',body_mass:'weight',body_fat_percentage:'bodyfat',
      resting_heart_rate:'rhr',heart_rate_variability:'hrv',heart_rate_variability_sdnn:'hrv',
      blood_oxygen_saturation:'spo2',oxygen_saturation:'spo2',step_count:'steps',
      waist_circumference:'waist',apple_sleeping_wrist_temperature:'temp',body_temperature:'temp'};
    const upV=(type,date,value)=>{const u=(VITAL_TYPES.find(t=>t.k===type)||{}).u||'';
      const i=S.vitals.findIndex(v=>v.type===type&&v.date===date);
      if(i>=0)S.vitals[i].value=value; else S.vitals.push({id:uid(),type,value,unit:u,date,source:'apple-health'});};
    const upS=(date,hours)=>{const i=S.sleep.findIndex(s=>s.date===date);
      if(i>=0)S.sleep[i].hours=hours; else S.sleep.push({id:uid(),hours,date,source:'apple-health'});};
    let n=0;
    metrics.forEach(m=>{
      const name=(m.name||'').toLowerCase(); const data=m.data||[];
      if(name.includes('sleep')){
        data.forEach(pt=>{const date=dkey(pt.date||pt.startDate); if(!date)return;
          let h=pt.asleep!=null?+pt.asleep:(pt.totalSleep!=null?+pt.totalSleep:(pt.value!=null?+pt.value:(pt.qty!=null?+pt.qty:null)));
          if(h==null||isNaN(h))return; if(h>24)h=h/3600; upS(date,+h.toFixed(1)); n++;});
        return;
      }
      let type=NAMEMAP[name];
      if(!type){ if(name.includes('systolic'))type='bp_sys'; else if(name.includes('diastolic'))type='bp_dia'; else if(name.includes('step'))type='steps'; }
      if(!type)return;
      data.forEach(pt=>{const date=dkey(pt.date); if(!date)return;
        let v=pt.qty!=null?+pt.qty:(pt.Avg!=null?+pt.Avg:(pt.value!=null?+pt.value:null));
        if(v==null||isNaN(v))return; upV(type,date,type==='steps'?Math.round(v):+v.toFixed(2)); n++;});
    });
    backupNow();save();closeSheet();show('body');toast(n?n+' datos importados':'Nada para importar');
  }catch(e){toast('JSON inválido');}
}
function wipe(){if(confirm('¿Borrar TODOS tus datos de este navegador? Se guarda una copia restaurable.')){backupNow();localStorage.removeItem(LS_KEY);location.reload();}}

/* ---------- ticker ---------- */
function buildTicker(){
  const bits=['100% LOCAL','SIN NUBE','TUS DATOS SON TUYOS','PRIVADO','CERO TELEMETRÍA','SALUD CENTRALIZADA'];
  const one=bits.map(b=>`${b}<b>✦</b>`).join('');
  document.getElementById('tickTrack').innerHTML=one+one;
}
